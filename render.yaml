# Render Blueprint — Dashboard PIP Puslapdik (Web Service)
# ---------------------------------------------------------------------------
# Deployment alternatif ke Render, berdampingan dengan Vercel (tidak menggantikan).
# Web Service dipilih karena aplikasi butuh runtime server: Google Sheets Service
# Account (menandatangani JWT dengan private key di server) dan Supabase service
# role — keduanya TIDAK boleh berjalan di browser.
#
# Cara pakai: New → Blueprint di dashboard Render, pilih repo ini. Render membaca
# file ini, membuat service, lalu meminta Anda mengisi env var bertanda `sync: false`.
#
# TIDAK ADA nilai rahasia di file ini. Semua secret diisi manual di dashboard.
services:
  - type: web
    name: pip-dashboard
    runtime: node
    plan: free
    region: singapore
    branch: main
    autoDeploy: true
    buildCommand: npm ci && npm run build
    startCommand: npm run start:render
    healthCheckPath: /health
    envVars:
      # --- Runtime (non-rahasia) ---
      - key: NODE_VERSION
        value: "20.18.1"
      # Mode akses Google Sheets: service_account (utama) atau oauth (alternatif).
      - key: GOOGLE_SHEETS_ACCESS_MODE
        value: service_account
      # Mode sumber data frontend (dibaca saat build oleh Vite).
      - key: VITE_DATA_MODE
        value: supabase

      # --- Frontend (VITE_* / NEXT_PUBLIC_*) — di-inline saat BUILD, bukan rahasia ---
      # URL & anon key Supabase (anon key AMAN untuk browser; BUKAN service role).
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      # Opsional: default pip.local bila dikosongkan.
      - key: VITE_AUTH_EMAIL_DOMAIN
        sync: false

      # --- Server-only (RAHASIA) — tidak pernah masuk bundle frontend ---
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # Service Account Google (mode utama). Email non-rahasia; private key RAHASIA.
      # Private key multiline: tempel apa adanya (dengan newline) ATAU sebagai satu
      # baris dengan "\n" — server menormalkan keduanya.
      - key: GOOGLE_SERVICE_ACCOUNT_EMAIL
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY
        sync: false
      # Secret webhook Apps Script + cron rekonsiliasi (samakan dengan Code.gs).
      - key: GOOGLE_WEBHOOK_SECRET
        sync: false

      # --- Opsional: hanya bila memakai mode OAuth (alternatif Service Account) ---
      # Redirect URI OAuth harus cocok host Render, mis:
      #   https://pip-dashboard.onrender.com/api/integrations/google/callback
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: GOOGLE_TOKEN_ENCRYPTION_KEY
        sync: false
      # URL aplikasi untuk redirect balik setelah OAuth (mis. URL onrender.com).
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      # Opsional: secret khusus cron (default memakai GOOGLE_WEBHOOK_SECRET).
      - key: CRON_SECRET
        sync: false
